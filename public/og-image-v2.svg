<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="system-ui, -apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">
  <!--
    NeuroWiki OG image v2 — 2026-05-19 (V audit)
    Replaces public/og-image.png. To deploy:
      1. Open this SVG in a browser, Figma, or any vector editor.
      2. Export a 1200×630 PNG (Figma: Export → 1× PNG).
      3. Save the PNG as public/og-image.png, overwriting the old file.
      4. Bump the og:image URL in index.html / Seo.tsx with a version suffix
         (?v=2) to bust Twitter / iMessage / Slack thumbnail caches.

    Design notes:
      - 1200×630 = OG/Twitter canonical aspect; safe zone is center ~960×420.
      - Brand-color enforcement: only #1746A2 (neuro-500), #EEF2FF (neuro-50),
        and the slate scale used by the site.
      - Asymmetric left-text / right-accent layout — same anatomy as Linear
        and Vercel's product OGs.
      - No literal synapse art. The right-side mark is three abstract curves
        suggestive of wave/signal — registers without being a stock cliché.
      - System font stack so the rendered PNG matches whatever the rasterizer
        has available; works whether exported via Chrome, Figma, or Sharp.
  -->

  <!-- ── Background ────────────────────────────────────────────────── -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Top brand bar (subtle cobalt accent line, marks the page as "ours") -->
  <rect x="0" y="0" width="1200" height="6" fill="#1746A2"/>

  <!-- ── Left text column ─────────────────────────────────────────── -->

  <!-- Eyebrow -->
  <g transform="translate(80, 160)">
    <rect x="0" y="-22" width="36" height="4" fill="#1746A2" rx="2"/>
    <text x="52" y="-12" font-size="20" font-weight="700" letter-spacing="3.5" fill="#475569">
      CLINICAL REFERENCE
    </text>
  </g>

  <!-- Wordmark — neuro-500 "Neuro" + slate-900 "Wiki", matches the in-app lockup -->
  <text x="80" y="320" font-size="138" font-weight="700" letter-spacing="-3.5">
    <tspan fill="#1746A2">Neuro</tspan><tspan fill="#0F172A">Wiki</tspan>
  </text>

  <!-- Tagline (2 lines for typographic rhythm) -->
  <text x="80" y="395" font-size="30" font-weight="400" fill="#475569" letter-spacing="-0.2">
    Calculators, pathways, and trial reference
  </text>
  <text x="80" y="435" font-size="30" font-weight="400" fill="#475569" letter-spacing="-0.2">
    for bedside neurology.
  </text>

  <!-- URL — small, slate-400, with a leading dot for rhythm -->
  <g transform="translate(80, 545)">
    <circle cx="6" cy="-6" r="4" fill="#1746A2"/>
    <text x="22" y="0" font-size="22" font-weight="500" fill="#64748B" letter-spacing="0">
      neurowiki.ai
    </text>
  </g>

  <!-- ── Right accent mark ────────────────────────────────────────── -->
  <!--
    Three curved strokes implying signal / wave / trace, without resorting
    to literal synapse-stock-art. Cobalt with descending opacity for depth.
    Anchored inside a soft neuro-50 disc that gives the right column a
    visual weight to balance the left text block.
  -->
  <g transform="translate(860, 175)">
    <!-- Soft disc backdrop — neuro-50 -->
    <circle cx="135" cy="140" r="200" fill="#EEF2FF"/>

    <!-- Curve 1 — strongest -->
    <path d="M 10 100 Q 90 -10 170 100 T 330 100"
          stroke="#1746A2" stroke-width="5" fill="none"
          stroke-linecap="round" opacity="0.85"/>
    <!-- Curve 2 -->
    <path d="M 10 165 Q 100 65 200 165 T 330 165"
          stroke="#1746A2" stroke-width="4.5" fill="none"
          stroke-linecap="round" opacity="0.55"/>
    <!-- Curve 3 — softest -->
    <path d="M 10 230 Q 110 140 220 230 T 330 230"
          stroke="#1746A2" stroke-width="4" fill="none"
          stroke-linecap="round" opacity="0.3"/>

    <!-- Endpoint dots on the strongest curve -->
    <circle cx="10" cy="100" r="7" fill="#1746A2"/>
    <circle cx="330" cy="100" r="7" fill="#1746A2"/>
  </g>

  <!-- ── Bottom brand bar (mirror of top, asymmetric width) ───────── -->
  <rect x="0" y="624" width="240" height="6" fill="#1746A2"/>
</svg>
