<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Neuro Wiki: Neurology Resident & Attending Guide</title>

    <!-- Basic Meta Tags -->
    <meta name="description" content="Your Neuro Wiki resident and attending guide. Score NIHSS and ICH, walk through stroke code, look up landmark trials. Save cases on this device, sync to phone.">

    <meta name="keywords" content="neurology resident guide, neurology tools, neurology attending guide, NIHSS calculator, stroke pathway, EVT eligibility, IVT calculator, neurology trials, clinical decision support, Neuro Wiki">

    <!-- Open Graph Meta Tags (for Facebook, LinkedIn) -->
    <meta property="og:title" content="Neuro Wiki: Neurology Resident & Attending Guide">
    <meta property="og:description" content="Your Neuro Wiki resident and attending guide. Score NIHSS and ICH, walk through stroke code, look up landmark trials. Save cases on this device, sync to phone.">
    <meta property="og:url" content="https://neurowiki.ai">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="NeuroWiki">
    <meta property="og:image" content="https://neurowiki.ai/og-image.png?v=4">
    <meta property="og:image:width" content="2848">
    <meta property="og:image:height" content="1504">
    <meta property="og:image:alt" content="NeuroWiki — Neurology resident and attending guide. Calculators, pathways, and trials at the bedside.">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Neuro Wiki: Neurology Resident & Attending Guide">
    <meta name="twitter:description" content="Your Neuro Wiki resident and attending guide. Score NIHSS and ICH, walk through stroke code, look up landmark trials. Save cases on this device, sync to phone.">

    <meta name="twitter:image:alt" content="NeuroWiki — Neurology resident and attending guide. Calculators, pathways, and trials at the bedside.">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://neurowiki.ai">
    
    <!-- Additional SEO -->
    <meta name="author" content="NeuroWiki">
    <meta name="robots" content="index, follow">

    <!-- Google Search Console ownership verification (URL-prefix property) -->
    <meta name="google-site-verification" content="pC_nNZmEQSZ6d6bJXP651aiH0Vc3FqnyKKsWyg4FsO8">

    <!-- iOS PWA — when installed to home screen, run full-screen with
         the brand cobalt extending under the status bar. The status bar
         text turns light against the cobalt background. -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NeuroWiki">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1746A2" />
    
    <!-- Fonts: preconnect first, then load stylesheet (non-render-blocking via media swap) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"></noscript>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"></noscript>
    
    <!-- Material Symbols / Icons: same font for both class names so icons render (not text) -->
    <style>
      .material-symbols-outlined,
      .material-icons-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        -webkit-font-smoothing: antialiased;
      }
    </style>
    
  <!-- Static baseline schema: WebSite + Organization. Per-route schema (MedicalWebPage, BreadcrumbList,
       FAQPage, SoftwareApplication) is injected dynamically by Seo.tsx on each navigation. -->
  <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "name": "NeuroWiki",
      "alternateName": ["Neuro Wiki", "Neurology Resident Guide"],
      "url": "https://neurowiki.ai",
      "description": "A neurology resident and attending guide. Free calculators, clinical pathways, and landmark trial summaries built on AHA/ASA 2026 guidelines.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://neurowiki.ai/calculators?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    },
    {
      "@type": "Organization",
      "name": "NeuroWiki",
      "alternateName": ["Neuro Wiki", "Neurology Resident Guide"],
      "url": "https://neurowiki.ai",
      "logo": "https://neurowiki.ai/icon-512.png",
      "description": "A neurology resident and attending guide — evidence-based protocols, calculators, and clinical guidelines for neurologists, residents, fellows, and attendings.",
      "foundingDate": "2024",
      "medicalSpecialty": "Neurology",
      "audience": {
        "@type": "MedicalAudience",
        "audienceType": "Neurology Resident, Neurology Fellow, Neurology Attending, Physician"
      },
      "knowsAbout": [
        "Stroke Management",
        "IV Thrombolysis",
        "Mechanical Thrombectomy",
        "Epilepsy",
        "Status Epilepticus",
        "Neurocritical Care",
        "Neuromuscular Disease",
        "Clinical Neurology Calculators"
      ]
    },
    {
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is NeuroWiki?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NeuroWiki (also written Neuro Wiki) is a free neurology resident and attending guide. It bundles bedside calculators, clinical pathways, and landmark trial summaries built on AHA/ASA 2026 stroke guidelines."
          }
        },
        {
          "@type": "Question",
          "name": "Who is NeuroWiki for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Neurology residents, fellows, attendings, and other physicians caring for stroke and neurology patients at the bedside."
          }
        },
        {
          "@type": "Question",
          "name": "Is NeuroWiki free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. All calculators, pathways, guides, and trial pages are free. No account or sign-up is required."
          }
        },
        {
          "@type": "Question",
          "name": "What does NeuroWiki cover?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NIHSS, ICH score, ASPECTS, GCS, ABCD2, HAS-BLED and other neurology calculators; stroke code, EVT, late-window IVT, status epilepticus, and migraine pathways; 101 landmark stroke trial summaries; and clinical guides for residents."
          }
        }
      ]
    }
  ]
}
</script>
</head>
  <body class="bg-slate-50 text-slate-800 antialiased selection:bg-neuro-200 selection:text-neuro-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
